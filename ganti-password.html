<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ganti Password - Sistem Inventori RRI Purwokerto</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>

  <div class="app-main">
    <div id="topbarContainer"></div>

    <div class="app-content">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6">
          <div class="card content-card p-4">
            <h5 class="fw-bold mb-1">Ganti Password</h5>
            <p class="text-muted small mb-3">
              Akun: <strong id="infoNama"></strong> (<span id="infoUsername"></span>)
            </p>

            <div id="passwordError" class="alert alert-danger d-none"></div>

            <form id="formGantiPassword">
              <div class="mb-3">
                <label class="form-label">Password Lama <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="oldPassword" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password Baru <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="newPassword" required minlength="6">
              </div>
              <div class="mb-3">
                <label class="form-label">Konfirmasi Password Baru <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="confirmPassword" required minlength="6">
              </div>
              <button type="submit" class="btn btn-rri-primary">Simpan Perubahan</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/ganti-password.js"></script>
</body>
</html>
